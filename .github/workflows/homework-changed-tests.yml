name: Tests for changed files

# Для PR у гілки homework/* запускає тести ТІЛЬКИ для змінених завдань.
# Кожен змінений TaskNN.java або TaskNNTest.java -> тест-клас TaskNNTest.
# Якщо ці тести падають — check червоний і PR не можна злити.
on:
  pull_request:
    branches:
      - 'homework/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: changed-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changed-file-tests:
    name: Tests for changed files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Collect changed files of this PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          pr="${{ github.event.pull_request.number }}"
          : > changed.txt
          page=1
          while : ; do
            resp=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repo/pulls/$pr/files?per_page=100&page=$page")
            cnt=$(printf '%s' "$resp" | python3 -c "import sys,json; d=json.load(sys.stdin); open('page.txt','w').write('\n'.join(f['filename'] for f in d)); print(len(d))")
            cat page.txt >> changed.txt; echo >> changed.txt
            [ "$cnt" -lt 100 ] && break
            page=$((page+1))
          done
          echo "Змінені файли PR:"; grep -v '^$' changed.txt || echo "(немає)"

      - name: Run tests for changed task files
        run: |
          set -uo pipefail
          declare -A MOD_TESTS
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [[ "$f" =~ ^(java-module-[0-9]+)/src/(main|test)/java/.*/(Task[0-9]+)(Test)?\.java$ ]]; then
              mod="${BASH_REMATCH[1]}"
              task="${BASH_REMATCH[3]}"
              MOD_TESTS["$mod"]+="${task}Test "
            fi
          done < changed.txt

          echo "### Tests for changed files" >> "$GITHUB_STEP_SUMMARY"

          if [ "${#MOD_TESTS[@]}" -eq 0 ]; then
            echo "Жодного зміненого Task*.java — тестувати нічого. ✓"
            echo "Немає змінених Task-файлів — перевірку пройдено автоматично." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          rc=0
          for mod in "${!MOD_TESTS[@]}"; do
            tests=$(echo "${MOD_TESTS[$mod]}" | tr ' ' '\n' | sed '/^$/d' | sort -u | paste -sd, -)
            echo "::group::$mod -> $tests"
            if mvn -B -ntp -f "$mod/pom.xml" test -Dtest="$tests" -Dsurefire.failIfNoSpecifiedTests=false; then
              echo "- :white_check_mark: \`$mod\`: $tests" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- :x: \`$mod\`: $tests" >> "$GITHUB_STEP_SUMMARY"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc
